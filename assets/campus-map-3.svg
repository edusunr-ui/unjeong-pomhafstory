    <rect x="362" y="26" width="118" height="86" rx="4"/>
    <rect x="438" y="156" width="110" height="70" rx="4"/>
    <rect x="82" y="40" width="104" height="78" rx="4" fill="#dfeaf3" stroke="#d3dee8"/>
  </g>
