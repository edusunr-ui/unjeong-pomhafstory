    <path d="M340 0 L278 300" stroke="#fff" stroke-width="38"/>
    <path d="M340 0 L278 300" stroke="#d7dce2" stroke-width="2"/>
  </g>
  <g fill="#eadbc9" stroke="#e4cdb6" stroke-width="1">
