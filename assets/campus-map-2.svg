    <rect x="360" y="26" width="116" height="84" rx="4"/>
    <rect x="438" y="160" width="110" height="70" rx="4"/>
    <rect x="80" y="38" width="104" height="78" rx="4" fill="#dfeaf3" stroke="#d3dee8"/>
  </g>
  <g font-family="Malgun Gothic, Arial, sans-serif" font-size="14" fill="#6e7e91">
    <text x="104" y="74" text-anchor="middle" fill="#5b83c8">산들초등학교</text>
    <text x="82" y="172">운정센트레빌</text>
    <text x="235" y="106" fill="#c47454">투썸플레이스</text>
    <text x="392" y="120" fill="#c46f58">기대플러스 병원</text>
    <text x="416" y="176" fill="#b86f51">밤맨 아라보쌈</text>
    <text x="342" y="160" fill="#6e7e91">크노리오</text>
