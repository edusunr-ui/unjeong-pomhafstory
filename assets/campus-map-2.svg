  <title id="title">수학의힘 외대HS 2관 위치 지도</title>
  <desc id="desc">산내중학교와 운정센트레빌 인근 교하로 87 삼성프라자 4층 위치를 표시한 지도 이미지</desc>
  <rect width="620" height="300" fill="#f5f4ef"/>
  <g opacity="0.86">
    <path d="M0 210 L620 142" stroke="#fff" stroke-width="60"/>
    <path d="M0 210 L620 142" stroke="#d7dce2" stroke-width="2"/>
    <path d="M118 0 L215 300" stroke="#fff" stroke-width="46"/>
    <path d="M118 0 L215 300" stroke="#d7dce2" stroke-width="2"/>
    <path d="M330 0 L270 300" stroke="#fff" stroke-width="38"/>
    <path d="M330 0 L270 300" stroke="#d7dce2" stroke-width="2"/>
  </g>
  <g fill="#eadbc9" stroke="#e4cdb6" stroke-width="1">
